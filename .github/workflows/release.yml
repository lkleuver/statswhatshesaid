name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Version or Publish
    runs-on: ubuntu-latest
    permissions:
      contents: write      # create release PR, push version bumps, create tags
      pull-requests: write # open and update the release PR
      id-token: write      # npm provenance attestation
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Verify
        run: npm run verify

      # The changesets action has two modes:
      #   1. If unreleased changesets exist on main, it opens/updates a
      #      "Version Packages" PR that bumps package.json + updates CHANGELOG.md.
      #   2. If that PR is merged (i.e. main has the version bump but no
      #      pending changesets), it publishes to npm.
      - name: Create Release PR or Publish
        uses: changesets/action@v1
        with:
          publish: npm run release
          commit: "chore(release): version packages"
          title: "chore(release): version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"
