name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Version or Publish
    runs-on: ubuntu-latest
    # Bound to the `npm-publish` GitHub environment so trusted publishing
    # via the npm trusted publisher rule is only accepted from jobs that
    # target this environment. Enables required-reviewer protection and
    # deployment-branch restrictions.
    environment: npm-publish
    permissions:
      contents: write      # create release PR, push version bumps, create tags
      pull-requests: write # open and update the release PR
      id-token: write      # npm OIDC trusted publishing + provenance attestation
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Node 24 ships with npm 11.x, which has native support for OIDC
      # trusted publishing. Don't try to upgrade npm in-place from a 10.x
      # bundle — that races against the running npm process and corrupts
      # the global install (the bundled arborist drops `promise-retry`
      # mid-flight). Just use a Node version that already has the right
      # npm.
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Verify
        run: npm run verify

      # The changesets action has two modes:
      #   1. If unreleased changesets exist on main, it opens/updates a
      #      "Version Packages" PR that bumps package.json + updates CHANGELOG.md.
      #   2. If that PR is merged (i.e. main has the version bump but no
      #      pending changesets), it publishes to npm.
      #
      # Trusted publishing: no NPM_TOKEN is passed. Modern npm automatically
      # exchanges the GitHub OIDC token for a short-lived npm publish token
      # using the trusted publisher configured on the npm side (workflow
      # `release.yml`, environment `npm-publish`).
      - name: Create Release PR or Publish
        uses: changesets/action@v1
        with:
          publish: npm run release
          commit: "chore(release): version packages"
          title: "chore(release): version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"
